<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apolo CodexAI - Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Apolo CodexAI</h1>
        <p>Monitoramento de Denúncias de Crimes</p>
        <div id="api-status">Verificando status da API...</div>
    </header>

    <nav>
        <button id="list-btn" class="active">Lista de Denúncias</button>
        <button id="map-btn">Mapa</button>
        <button id="create-btn">Nova Denúncia</button>
    </nav>

    <main>
        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Carregando...</p>
        </div>

        <div id="error-message" class="hidden"></div>

        <div id="list-view">
            <h2>Denúncias</h2>
            <ul id="denuncias-list"></ul>
        </div>

        <div id="map-view" class="hidden">
            <h2>Mapa de Denúncias</h2>
            <div id="map"></div>
        </div>

        <div id="create-view" class="hidden">
            <h2>Criar Nova Denúncia</h2>
            <form id="create-form">
                <label for="tipo">Tipo de Crime:</label>
                <input type="text" id="tipo" required>

                <label for="descricao">Descrição:</label>
                <textarea id="descricao" required></textarea>

                <label for="latitude">Latitude:</label>
                <input type="number" id="latitude" step="any" required>

                <label for="longitude">Longitude:</label>
                <input type="number" id="longitude" step="any" required>

                <button type="button" id="get-location">Usar Minha Localização</button>

                <label for="anonimo">
                    <input type="checkbox" id="anonimo"> Anônimo
                </label>

                <button type="submit">Criar Denúncia</button>
            </form>
        </div>
    </main>

    <div id="toast-container"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
