<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apolo CodexAI - Dashboard</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <img id="main-logo" src="frontend/logo.png" alt="Apolo CodexAI Logo">
            <p>Monitoramento de Denúncias de Crimes</p>
            <div id="api-status">Verificando status da API...</div>
        </div>
    </header>

    <nav>
        <button id="list-btn" class="active">Lista de Denúncias</button>
        <button id="map-btn">Mapa</button>
        <button id="create-btn">Nova Denúncia</button>
    </nav>

    <main>
        <div id="loading" class="hidden">
            <div class="sun-icon">☀️</div>
            <h3></h3>
            <p></p>
        </div>

        <div id="error-message" class="hidden"></div>

        <div id="list-view">
            <h2>Denúncias</h2>
            <ul id="denuncias-list"></ul>
        </div>

        <div id="map-view" class="hidden">
            <h2>Mapa de Denúncias</h2>
            <div id="map"></div>
        </div>

        <div id="create-view" class="hidden">
            <h2>Criar Nova Denúncia</h2>
            <form id="create-form">
                <label for="tipo">Tipo de Crime:</label>
                <select id="tipo" required>
                    <option value="">Selecione um tipo de crime</option>
                </select>
                <div id="tipo-loading" class="small-text">Carregando tipos de crime...</div>

                <label for="descricao">Descrição:</label>
                <textarea id="descricao" required placeholder="Descreva a denúncia em detalhes..."></textarea>

                <label for="endereco">Endereço:</label>
                <div class="address-field">
                    <input type="text" id="endereco" placeholder="Digite um endereço ou clique no mapa para preencher automaticamente" autocomplete="off">
                    <div id="address-loading" class="small-text hidden">Buscando sugestões...</div>
                    <ul id="sugestoes" class="sugestoes-lista hidden"></ul>
                </div>

                <button type="button" id="get-location">Usar Minha Localização</button>

                <label for="anonimo" class="checkbox-label">
                    <input type="checkbox" id="anonimo"> Denúncia Anônima
                </label>

                <button type="submit">Criar Denúncia</button>
            </form>
        </div>
    </main>

    <div id="menu-links" aria-label="Links rápidos">
        <div id="links-dropdown" class="hidden" aria-hidden="true">
            <a href="https://github.com/IsaacCosta23/Apolo_API" target="_blank" rel="noopener noreferrer">
                <span class="link-icon" aria-hidden="true">⌘</span>
                <span>Ver código no GitHub</span>
            </a>
            <a href="/docs" target="_blank" rel="noopener noreferrer">
                <span class="link-icon" aria-hidden="true">📄</span>
                <span>Documentação da API</span>
            </a>
        </div>
        <button id="btn-menu" type="button" aria-expanded="false" aria-controls="links-dropdown" aria-label="Abrir links úteis">☰</button>
    </div>

    <div id="toast-container"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/leaflet/leaflet-heat.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
